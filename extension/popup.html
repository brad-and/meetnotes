<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>MeetNotes</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="header">
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">MeetNotes</span>
    </div>
    <button class="icon-btn" id="btn-settings" title="설정">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <!-- 설정 패널 -->
  <div class="settings-panel" id="settings-panel" style="display:none">
    <div class="field-label">앱 URL</div>
    <div style="display:flex;gap:6px;margin-top:6px">
      <input class="text-input" id="input-app-url" type="text" placeholder="http://localhost:3000" />
      <button class="btn-sm" id="btn-save-url">저장</button>
    </div>
  </div>

  <!-- 대기 화면 -->
  <div id="screen-idle" style="padding:16px">
    <div class="field-label" style="margin-bottom:6px">회의 제목 (선택)</div>
    <input class="text-input" id="input-title" type="text" placeholder="제목을 입력하세요" style="margin-bottom:14px" />
    <button class="btn-record" id="btn-start">
      <span class="rec-dot"></span>
      녹음 시작
    </button>
  </div>

  <!-- 녹음 중 화면 -->
  <div id="screen-recording" style="display:none;padding:16px">
    <div class="recording-status">
      <div class="pulse-dot"></div>
      <span id="rec-title-label" class="rec-status-text">녹음 중</span>
    </div>
    <p class="rec-hint">회의록 작성은 MeetNotes 탭에서 진행됩니다</p>
    <button class="btn-stop" id="btn-stop">■ 녹음 종료</button>
    <button class="btn-focus" id="btn-focus">MeetNotes 탭으로 이동 →</button>
  </div>

  <!-- 오류 화면 -->
  <div id="screen-error" style="display:none;padding:16px">
    <div class="error-wrap">
      <div class="error-icon">!</div>
      <div class="error-msg" id="error-msg"></div>
    </div>
    <button class="btn-record" id="btn-retry" style="margin-top:12px">다시 시도</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
